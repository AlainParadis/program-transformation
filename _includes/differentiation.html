<h4>{{ site.data.sitewide.differentiators-title }}</h4>
<p>
{{ site.data.sitewide.differentiators-intro }}
</p>

{% assign sorted = site.data.sitewide.differentiators | sort: "differentiator" %}
<ol>
  {% for item in sorted %}
    <li>
      <strong>{{ item.differentiator-title }}.</strong> {{ item.differentiator-desc }}
    </li>
  {% endfor %}
</ol>
