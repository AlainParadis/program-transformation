<h5>{{ site.data.sitewide.strat-plan-title }}</h5>
<p>
<a href="{{ site.data.sitewide.strat-plan-url }}" target="_blank" class="external">Read the Strategic Plan</a>
</p>

{% assign sorted = site.data.sitewide.strat-plan | sort: "priority" %}
<ol>
  {% for item in sorted %}
    <li>
      <strong>{{ item.title }}.</strong> {{ item.response }}
    </li>
  {% endfor %}
</ol>
