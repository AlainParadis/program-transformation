<h4><a name="strat-plan">{{ site.data.sitewide.strat-plan-title }}</a></h4>
<p>
{{ site.data.sitewide.strat-plan-intro }}
</p>

{% assign sorted = site.data.sitewide.strat-plan | sort: "priority" %}
<ol>
  {% for item in sorted %}
    <li>
      <strong>{{ item.title }}.</strong> {{ item.response }}
    </li>
  {% endfor %}
</ol>
