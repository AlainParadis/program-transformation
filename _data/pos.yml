semesters:
  - title: "Semester 1"
    a-name: "semester-1"
    courses:
      - title: "Foundations of Human-Centred Design"
        core: true
        description: >
          Introduces human-centred design as evidence-based practice. Students learn empathy, problem framing, and how to separate evidence from assumption.
      - title: "Design Thinking for Innovation"
        core: true
        description: >
          Teaches design thinking as a named method through ideation, prototyping, and critique. Students apply the method, then justify the approach they chose.
      - title: "Introduction to Digital Design Tools"
        core: true
        description: >
          Hands-on fundamentals of Photoshop, Illustrator, and InDesign through project-based work.
      - title: "Brand and Visual Strategy"
        core: true
        description: >
          Builds brand narrative and identity alongside colour, perception, and visual systems.
      - title: "Breadth Elective: Indigenous Studies"
        core: false
        description: >
          A breadth course in First Nations, Metis, and Inuit knowledge and perspectives.

  - title: "Semester 2"
    a-name: "semester-2"
    courses:
      - title: "Design Research Methods I: Discovery"
        core: true
        description: >
          Foundations of design research. Students learn qualitative and quantitative methods and when each one applies.
      - title: "Strategic Concept Development"
        core: true
        description: >
          Develops the ability to build and defend a creative direction as a sustained, evidence-backed argument.
      - title: "Digital Design Tools 2"
        core: true
        description: >
          Advances tool skills. Applies generative tools, Figma plugins, and automation for asset creation.
      - title: "Communication for Designers"
        core: true
        description: >
          Builds storytelling and visual rhetoric for non-specialist audiences.
      - title: "Breadth Elective: Humanities"
        core: false
        description: >
          A breadth course in a humanities discipline outside design.

  - title: "Semester 3"
    a-name: "semester-3"
    courses:
      - title: "Design Research Methods II: Evaluation and Testing"
        core: true
        description: >
          Teaches usability testing and comparative evaluation. Students choose between approaches on the evidence. They also learn to test AI-generated options rather than accept them.
      - title: "Web Foundations: HTML and CSS"
        core: true
        description: >
          Teaches HTML, CSS, accessibility, and responsive design through live projects.
      - title: "Iterative Prototyping Studio"
        core: true
        description: >
          Frames prototyping as inquiry. Each iteration tests a clear hypothesis against evidence.
      - title: "Motion and Interaction Design"
        core: true
        description: >
          Animation and interactive elements in After Effects and Figma, focused on audience impact.
      - title: "Breadth Elective: Social Sciences"
        core: false
        description: >
          A breadth course in a social science discipline outside design.

  - title: "Semester 4"
    a-name: "semester-4"
    courses:
      - title: "UX/UI Methods with Figma and Web"
        core: true
        description: >
          Deepens user-centred design as a disciplined method. Students run structured usability evaluation, then act on the findings.
      - title: "Design Across Media and Channels"
        core: true
        description: >
          Work across print, digital, and immersive media, plus multichannel campaigns. Includes a real-world hackathon intensive.
      - title: "Business of Creative Innovation"
        core: true
        description: >
          Finance, intellectual property, ethics, and the paths to employment or founding a practice.
      - title: "Design Systems and Brand Identity"
        core: true
        description: >
          Builds cohesive, adaptable visual identities through systems thinking.
      - title: "Breadth Elective: Science or Mathematics"
        core: false
        description: >
          A breadth course in a science or mathematics discipline.

  - title: "Semester 5"
    a-name: "semester-5"
    courses:
      - title: "Evidence Synthesis and Design Argumentation"
        core: true
        description: >
          Students synthesize research into defensible decisions. They make critical use of scholarly reviews and primary sources to sustain an argument.
      - title: "Advanced Image and Data Workflows"
        core: true
        description: >
          Advanced image and data work. Data is treated as evidence. Visualisation is treated as argument.
      - title: "Systems Thinking for Designers"
        core: true
        description: >
          Approaches problems holistically, integrating product, user, and social context.
      - title: "Emerging and Experimental Design Practice"
        core: true
        description: >
          Explores future tools, generative design, and experimental technique through creative risk-taking.
      - title: "Portfolio and Professional Practice 1"
        core: true
        description: >
          Builds a process-focused portfolio and professional foundations.

  - title: "Semester 6"
    a-name: "semester-6"
    courses:
      - title: "Special Topics in Responsible Design"
        core: true
        description: >
          Studies sustainability, inclusive design, and ethics in practice.
      - title: "Team Leadership and Creative Project Management"
        core: true
        description: >
          Builds vision setting, influence, collaboration, and project management.
      - title: "Professional Practice and Career Launch"
        core: true
        description: >
          Refines portfolio and professional presentation alongside personal brand and career strategy.
      - title: "Research-Driven Showcase Capstone"
        core: true
        description: >
          Pairs original work with a defended methodology, from problem to outcome. The terminal demonstration of degree-level inquiry.
      - title: "Breadth Elective: Free Elective"
        core: false
        description: >
          A degree-level course freely chosen by the student.
      # Work-integrated learning. Excluded from the core/non-core breadth calculation.
      - title: "Industry Immersion: Collaborative Studio"
        work_integrated_learning: true
        hours: 300
        description: >
          A field placement with real clients and mentors. A 300-hour work term, not counted among the thirty courses.