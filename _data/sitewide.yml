grad_outcomes:
  - id: 1
    text: "Apply design knowledge across graphic, interactive, product, and service design to frame and solve problems within a chosen area of focus."
  - id: 2
    text: "Conduct design research using established qualitative and quantitative methods to gather, evaluate, and interpret evidence about users and context."
  - id: 3
    text: "Evaluate competing design approaches using recognized methods, then justify the approach chosen."
  - id: 4
    text: "Devise and sustain a reasoned design argument, supported by evidence and by critical use of scholarly and primary sources."
  - id: 5
    text: "Communicate design decisions and their rationale clearly to specialist and non-specialist audiences, in visual, written, and spoken form."
  - id: 6
    text: "Apply strategic and systems thinking to position design work above routine production, including work that emerging technologies can automate."
  - id: 7
    text: "Integrate emerging technologies, including generative tools, into practice while critically validating their outputs against evidence."
  - id: 8
    text: "Adapt practice across disciplines, media, and changing professional conditions, then identify and address their own continuing learning needs."
  - id: 9
    text: "Exercise personal responsibility and accountability in independent and collaborative work, consistent with academic integrity and professional standards."
  - id: 10
    text: "Apply principles of responsible design, including sustainability, inclusion, and ethics, when judging the social impact of design decisions."
  - id: 11
    text: "Recognize the limits of their own knowledge and evidence, then account for that uncertainty in their analysis and decisions."

