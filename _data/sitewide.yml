peqab_intro: >
  The Postsecondary Education Quality Assessment Board (PEQAB) is an Ontario body that reviews applications for Ministerial consent to offer degree programs under the Post-secondary Education Choice and Excellence Act, 2000. When a college seeks consent to offer a new bachelor's degree, the Minister refers the application to PEQAB for an independent quality assurance review. PEQAB evaluates each application against 12 Program Quality Standards and two System Coordination Considerations, and then provides a recommendation to the Minister. Consent is only granted when all Standards are met.
system_coordination_considerations:
- title: "Economic Need"
  description: "The proposed degree program reflects economic needs within Ontario."
- title: "Non-Duplication"
  description: "The proposed degree program does not duplicate or closely approximate existing degree programs reasonably accessible to students comprising the proposed student demand."
peqab-standards:
- title: "Degree Level"
  description: "The program meets the Baccalaureate/Bachelor's Degree Level Standard on the Ontario Qualifications Framework, across six elements: depth and breadth of knowledge, conceptual and methodological awareness, communication skills, application of knowledge, professional capacity/autonomy, and awareness of limits of knowledge."
- title: "Admission, Promotion and Graduation"
  description: "Admission, promotion, and graduation requirements are consistent with the Ontario Qualifications Framework and the postsecondary character of degree granting organizations."
- title: "Program Content"
  description: "The program offers current knowledge in the field of sufficient rigour, breadth and depth to achieve the knowledge and skills identified in the Degree Level Standard."
- title: "Program Delivery"
  description: "The program structure and delivery methods support achievement of the expected and actual learning outcomes."
- title: "Capacity to Deliver"
  description: "The organization has the capacity to deliver the quality of education necessary for students to attain the stated and necessary learning outcomes."
- title: "Credential Recognition"
  description: "While meeting particular needs, the program is designed to maximize the graduates' potential for employment and promotion in their field and, where applicable, for further study."
- title: "Regulation and Accreditation"
  description: "Programs leading to occupations subject to government or other regulations are designed to prepare students to meet the requirements of the relevant regulatory and/or accrediting body."
- title: "Nomenclature"
  description: "The program nomenclature reflects the postsecondary education achieved, facilitates public understanding of the qualification, and assists students, employers, and other postsecondary institutions to recognize the level, nature, and discipline of study."
- title: "Internal Quality Assurance Process (IQAP)"
  description: "The continuous quality of the program is assured by effective internal quality assurance mechanisms for periodic evaluation."
- title: "Academic Freedom and Integrity"
  description: "The organization maintains an atmosphere in which academic freedom exists and in which students and academic staff are expected to display a high degree of intellectual independence, supported by policies encouraging academic honesty and integrity."
- title: "Student Protection"
  description: "The organization values and upholds integrity and ethical conduct in its relations with students."
- title: "Credential Level (new programs only)"
  description: "The degree program does not result in an unwarranted raising of the level of credentials in the field or among similar programs across the Ontario College system."

