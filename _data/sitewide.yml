strat-plan-title: "Strategic Alignment"
strat-plan-url: "https://www.algonquincollege.com/strategicplan/"
strat-plan-intro: "Algonquin's Màmawe pinàshkàdà strategic plan identifies three priorities, each grounded in our polytechnic positioning."
strat-plan:
  - priority: 01
    title: "Career-focused, lifelong learning"
    response: "A degree credential opens labour market doors that diplomas do not, particularly for senior, strategic, and leadership roles in design. The applied focus, industry immersion, and portfolio-driven assessment match employer expectations directly."
  - priority: 02
    title: "Technology and intelligence"
    response: "AI-integrated curriculum from semester one. The program is AI-integrated by design rather than by retrofit. Curriculum emphasizes higher-order thinking, ambiguity navigation, and decision ownership above the layer AI automates. Graduates learn to pivot across design disciplines, work modalities, and emerging tools. Resilience and adaptability are taught as core competencies, not soft skills. This is a deliberate response to the technology disruption the strategic plan names as central."
  - priority: 03
    title: "Partnering for prosperity"
    response: "Industry partnerships are embedded throughout the curriculum through hackathons, collaborative studios, and capstone immersion. The program supplies talent matched to evolving labour market needs."
  - priority: 04
    title: "Foundations: Indigenization"
    response: "The Special Topics in Responsible Design course provides an entry point for Indigenous design perspectives, traditional knowledge in visual communication, and ethical practice grounded in relational accountability."
  - priority: 05
    title: "Foundations: Financial resilience"
    response: "Degree-level tuition, differentiated positioning, and a market segment Algonquin does not currently serve"
  - priority: 06
    title: "Sustainability"
    response: "Sustainable, inclusive, and ethical design are explicit curriculum content."

differentiators-title: "Program Differentiators"
differentiators-intro: "Eleven Canadian institutions already offer design degrees. The proposed program differentiates on five points they do not own together."
differentiators:
  - differentiator: 01
    differentiator-title: "AI-integrated, not AI-adjacent"
    differentiator-desc: "AI is built into the curriculum strategy, not bolted on as one elective. Generative AI tools are integrated from semester one as creative and production partners, with explicit attention to ethics, originality, and human direction."
  - differentiator: 02
    differentiator-title: "Process portfolio, not artifact portfolio"
    differentiator-desc: "Assessment rewards documented decision-making, not just polished final work. This proves to employers that graduates can be trusted with ambiguous problems. Assessment shifts from polished final artifacts to documented decision-making processes. Portfolios demonstrate strategic capacity, not just visual output."
  - differentiator: 03
    differentiator-title: "Cross-disciplinary breadth"
    differentiator-desc: "Graphic, interactive, product, and service design taught as one practice, reflecting how the industry actually works."
  - differentiator: 04
    differentiator-title: "Three years, not four"
    differentiator-desc: "Faster time to credential, lower total tuition, full degree recognition."
  - differentiator: 05
    differentiator-title: "College pedagogy with degree outcomes"
    differentiator-desc: "Smaller class sizes, applied focus, and industry immersion paired with degree-level theory and research expectations."

evidence-base:
  - evidence-category: "Labour market signals"
    evidence-items:
      - evidence-item: "Canada-wide projection: 28,500 new job openings for NOC 52120 (Graphic Designers and Illustrators) against 43,700 new job seekers over 2024 to 2033. Employment in 2023 was 93,200 workers. Expected annual employment growth is 1.2%. <a href='https://occupations.esdc.gc.ca/sppc-cops/occupationsummarydetail.jsp?tid=249&amp;lang=eng' target='_blank' class='external'></a> The surplus signal is itself the strategic argument. The proposed program is designed to position graduates above the shrinking core, not within it. Traditional graphic design is in oversupply. Strategic, UX-oriented, and AI-enhanced design is where the growth lies."
      - evidence-item: "Ontario 2024 to 2026 outlook for NOC 52120 is rated <em>limited</em>. Job Bank notes that UI/UX is the growth segment within the occupation. <a href='https://www.on.jobbank.gc.ca/marketreport/outlook-occupation/5747/ON' target='_blank' class='external'></a> The proposed program is designed around this growth pocket, not the shrinking core."
      - evidence-item: "- Ontario's Immigrant Nominee Program (OINP) issued invitations to candidates with job offers in NOC 52120 under the International Student stream in early 2026 draws, signalling continued provincial demand for the occupation. <a href='https://www.ontario.ca/page/2026-ontario-immigrant-nominee-program-updates' target='_blank' class='external'></a>"
      - evidence-item: "<em>Registered graphic designer</em> is a protected title in Ontario, supporting the credibility of degree-level education. <a href='https://www.ola.org/en/legislative-business/bills/parliament-36/session-1/bill-pr56' target='_blank' class='external'></a>"
  - evidence-category: "Student demand signals"
    evidence-items:
      - evidence-item: "High school graduates increasingly weigh degree recognition. Eleven Canadian peer institutions now offer design degrees, indicating sustained demand for the credential category."
      - evidence-item: "Algonquin's existing graphic design diploma applicant pool offers a natural source of qualified applicants and laddering opportunities."
      - evidence-item: "OCAS application data for comparable Ontario programs will be commissioned during the Development phase per the standard process."
  - evidence-category: "Stakeholder signals"
    evidence-items:
      - evidence-item: "Industry partners and the Program Advisory Committee have raised the AI shift in PAC discussions."
      - evidence-item: "Faculty have signalled readiness to evolve curriculum beyond the current diploma framework."

risk-mitigation:
  - risk-item: "<em>Limited</em> Ontario NOC 52120 outlook"
    risk-item-desc: "Program is built around growth segments (UX, service design, strategy) and AI-enhanced practice, not the shrinking traditional core."
  - risk-item: "Duplication concerns with eleven existing Canadian degrees"
    risk-item-desc: "Differentiation is documented in nomenclature and program design. PEQAB Standard 13 (Non-Duplication) addressed via Eastern Ontario regional demand and unique positioning."
  - risk-item: "Three-year credential perception as <em>less than</em> honours degree"
    risk-item-desc: "Positioned as the right credential for applied practice. Honours pathway can be added later if demand warrants."
  - risk-item: "Tuition price sensitivity"
    risk-item-desc: "Three-year structure reduces total cost versus four-year alternatives, while still commanding degree-level tuition."
  - risk-item: "Faculty credentials gap for degree teaching (PEQAB requires Master's for 50% of core)"
    risk-item-desc: "Identify gaps early. Plan hiring or up-skilling during Development phase. Existing Master's-credentialed faculty already on staff."

