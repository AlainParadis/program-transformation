strat-plan-title: "Strategic Alignment"
strat-plan-url: "https://www.algonquincollege.com/strategicplan/"
strat-plan-intro: "This is how the proposed program aligns with with Màmawe pinàshkàdà (2025-2030). <a href='{{ site.data.sitewide.strat-plan-url }}' target='_blank' class='external'></a> The plan sets three priorities. Each priority carries named objectives. The plan also rests on four Foundations for Success. The program advances all three priorities, maps to named objectives within each, and supports all four foundations."

strat-plan:
  - priority: 01
    title: "Career-focused, lifelong learning"
    response: "A degree credential is the stated baseline for senior, strategic, and leadership design roles across Ontario employers, including agencies, financial services, technology, and government. Statistics Canada earnings data shows degree holders earn a <a href='https://www150.statcan.gc.ca/n1/pub/14-28-0001/2025001/article/00001-eng.htm' target='_blank' target='_blank' rel='noreferrer noopener' class='external'>substantial premium</a> over diploma holders across a career. This reflects the credential’s role as a hiring filter at the senior tier. The program advances two named objectives under this priority. It amplifies future-ready skills. Communication, critical thinking, leadership, and digital literacy are built into the <a href='#outcomes'>graduate outcomes</a>. It designs agile learning pathways."
  - priority: 02
    title: "Technology and intelligence"
    response: "The curriculum is AI-integrated from semester one. It is AI-integrated by design, not by retrofit. This directly advances the plan's ‘Foster AI Innovation’ objective. The program models the living lab for responsible AI that the plan calls for. Curriculum emphasizes higher-order thinking, ambiguity navigation, and decision ownership above the layer AI automates. Generative tools are treated as creative partners, with explicit attention to ethics, originality, and human direction. Resilience and adaptability are taught as core competencies, not soft skills. This is a deliberate response to the technology disruption the plan names as central."
  - priority: 03
    title: "Partnering for prosperity"
    response: "The program advances three named objectives under this priority. It co-creates with key sectors. The Program Advisory Committee shapes curriculum. The named sectors of technology and government sit at the centre of Ottawa’s design labour market. It drives impact through partnership. Hackathons, collaborative studios, and a capstone immersion connect learners to real industry problems. It expands experiential learning. The 300-hour work term functions as co-operative education. The <a href='#semester-4'>Business of Creative Innovation course</a> develops entrepreneurship. The program supplies talent matched to evolving labour market needs."
  - priority: 04
    title: "Foundations: Our People"
    response: "Degree delivery depends on qualified faculty. Core teaching requires a Master’s. A share of the student experience requires terminal-credentialed faculty. The Development phase will confirm existing qualified faculty, plan targeted hiring, and support up-skilling. This investment in teaching capacity advances the plan’s commitment to its people."
  - priority: 05
    title: "Foundations: Indigenization"
    response: "The <a href='#semester-6'>Special Topics in Responsible Design</a> course provides an entry point for Indigenous design perspectives, traditional knowledge in visual communication, and ethical practice grounded in accountability. This supports the plan’s commitment to the Truth and Reconciliation Commission Calls to Action."
  - priority: 06
    title: "Foundations: Financial resilience"
    response: "The degree carries degree-level tuition, <a href='#differentiation'>differentiated positioning</a>, and a market segment Algonquin does not currently serve."
  - priority: 07
    title: "Sustainability"
    response: "Sustainable, inclusive, and ethical design are explicit curriculum content. This content is consistent with the College’s stated response to the United Nations Sustainable Development Goals."
  - priority: 08
    title: "Polytechnic identity"
    response: "The program reflects the polytechnic advantage the plan places at its centre. It pairs applied learning with applied research through process-driven inquiry, the showcase capstone, and industry collaboration. This positions the program within the vision of polytechnic leadership in the nation’s capital."

differentiators-title: "Points of Differentiation"
differentiators-intro: "Multiple Canadian institutions already offer design degrees. The proposed program differentiates on five points they do not own together."
differentiators:
  - differentiator: 01
    differentiator-title: "AI-integrated, not AI-adjacent"
    differentiator-desc: "AI is built into the curriculum strategy, not bolted on as one elective. Generative AI tools are integrated from semester one as creative and production partners, with explicit attention to ethics, originality, and human direction."
  - differentiator: 02
    differentiator-title: "Process portfolio, not artifact portfolio"
    differentiator-desc: "Assessment rewards documented decision-making, not just polished final work. This proves to employers that graduates can be trusted with ambiguous problems. Assessment shifts from polished final artifacts to documented decision-making processes. Portfolios demonstrate strategic capacity, not just visual output."
  - differentiator: 03
    differentiator-title: "Cross-disciplinary breadth"
    differentiator-desc: "Graphic, interactive, product, and service design taught as one practice, reflecting how the industry actually works."
  - differentiator: 04
    differentiator-title: "Three years, not four"
    differentiator-desc: "Faster time to credential, lower total tuition, full degree recognition."
  - differentiator: 05
    differentiator-title: "College pedagogy with degree outcomes"
    differentiator-desc: "Smaller class sizes, applied focus, and industry immersion paired with degree-level theory and research expectations."

evidence-base:
  - evidence-category: "Labour market signals"
    evidence-items:
      - evidence-item: "Canada-wide projection: 28,500 new job openings for NOC 52120 (Graphic Designers and Illustrators) against 43,700 new job seekers over 2024 to 2033. Expected annual employment growth is 1.2%. <a href='https://occupations.esdc.gc.ca/sppc-cops/occupationsummarydetail.jsp?tid=249&amp;lang=eng' target='_blank' class='external'></a> The surplus signal is itself the strategic argument. <em>The proposed program is designed to position graduates above the shrinking core, not within it.</em> Strategic, UX-oriented, and AI-enhanced design is where the growth lies."
      - evidence-item: "Job Bank notes that UI/UX is the growth segment within the occupation. <a href='https://www.on.jobbank.gc.ca/marketreport/outlook-occupation/5747/ON' target='_blank' class='external'></a> <em>The proposed program is designed around this growth pocket, not the shrinking core.</em>"
      - evidence-item: "Ontario's Immigrant Nominee Program (OINP) issued invitations to candidates with job offers in NOC 52120 under the International Student stream in early 2026 draws, <em>signalling continued provincial demand for the occupation</em>. <a href='https://www.ontario.ca/page/2026-ontario-immigrant-nominee-program-updates' target='_blank' class='external'></a>"
      - evidence-item: "<em>Registered graphic designer</em> is a protected title in Ontario, supporting the credibility of degree-level education. <a href='https://www.ola.org/en/legislative-business/bills/parliament-36/session-1/bill-pr56' target='_blank' class='external'></a>"
      - evidence-item: "In the Canadian Occupational Projection System (COPS), there is no published outlook for <a href='https://occupations.esdc.gc.ca/sppc-cops/occupationsummarydetail.jsp?tid=23' target='_blank' class='external'>NOC 11202</a>. As of June 2, 2026, it states 'A summary of the projections for this occupation will be provided in the near future.' <a href='https://www.nationwidevisas.com/canada-immigration/noc-code-canada/11202-professional-occupations-in-advertising-marketing-and-public-relations/' target='_blank' class='external'>Third parties</a> report <em>high demand</em>."
      - evidence-item: "<a href='https://occupations.esdc.gc.ca/sppc-cops/occupationsummarydetail.jsp?tid=249' target='_blank' class='external'>NOC 52120</a> has an oversupply signal."
      - evidence-item: "The Web Designers <a href='https://occupations.esdc.gc.ca/sppc-cops/occupationsummarydetail.jsp?tid=92' target='_blank' class='external'>NOC 21233</a> has <em>balanced</em> projections."
  - evidence-category: "Student demand signals"
    evidence-items:
      - evidence-item: "High school graduates increasingly weigh degree recognition. Eleven Canadian peer institutions now offer design degrees, indicating sustained demand for the credential category."
      - evidence-item: "Algonquin's existing graphic design diploma applicant pool offers a natural source of qualified applicants and laddering opportunities."
      - evidence-item: "OCAS application data for comparable Ontario programs will be commissioned during the Development phase per the standard process."
  - evidence-category: "Stakeholder signals"
    evidence-items:
      - evidence-item: "Industry partners and the Program Advisory Committee have raised the AI shift in PAC discussions."
      - evidence-item: "Faculty have signalled readiness to evolve curriculum beyond the current diploma framework."

risk-mitigation:
  - risk-item: "3-year Applied Degree has little track record"
    risk-item-desc: "We are proposing a three-year applied degree. That is a different and newer credential. Ontario only created the three-year applied college degree in April 2022. The announcement targeted health, automotive technology, and infrastructure. Design was not a named sector. So our two best comparators are not actually precedents for our credential. They are precedents for the four-year honours version of it. There is far less track record for a three-year applied design degree specifically."
  - risk-item: "Flat Enrolment"
    risk-item-desc: "There have been more college degrees launched. Enrolment did not rise to meet them. That is a province-wide caution about applicant demand for exactly this credential category. It points back to the same gate flagged before. The real risk is not the labour outlook. It is whether students will apply."
  - risk-item: "<em>Limited</em> Ontario NOC 52120 outlook"
    risk-item-desc: "Program is built around growth segments (UX, service design, strategy) and AI-enhanced practice, not the shrinking traditional core."
  - risk-item: "Three-year credential perception as <em>less than</em> honours degree"
    risk-item-desc: "Positioned as the right credential for applied practice. Honours pathway can be added later if demand warrants."
  - risk-item: "Tuition price sensitivity"
    risk-item-desc: "Three-year structure reduces total cost versus four-year alternatives, while still commanding degree-level tuition."
  - risk-item: "Faculty credentials for degree teaching"
    risk-item-desc: "Core faculty require a Master’s. At least 40 percent of the total student experience requires terminal-credentialed faculty, normally a doctorate. Plan: confirm existing Master’s-qualified faculty, plan hiring and up-skilling during Development, and seek a PEQAB Pre-Determination on an acceptable terminal-credential package for design."

